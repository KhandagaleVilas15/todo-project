<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Registration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #0f0f12;
      --surface: #1a1a20;
      --surface-hover: #222229;
      --border: #2d2d36;
      --text: #f0f0f2;
      --text-muted: #8b8b94;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --success: #22c55e;
      --danger: #ef4444;
    }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image: 
        radial-gradient(ellipse 80% 50% at 50% -20%, rgba(99, 102, 241, 0.15), transparent),
        radial-gradient(ellipse 60% 40% at 100% 100%, rgba(99, 102, 241, 0.08), transparent);
    }

    .container {
      max-width: 720px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.35rem;
    }

    .subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.75rem;
      margin-bottom: 2rem;
    }

    .form-card h2 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 1.25rem;
      color: var(--text-muted);
    }

    .form-grid {
      display: grid;
      gap: 1.25rem;
    }

    @media (min-width: 520px) {
      .form-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .form-group.full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
    }

    input, select {
      padding: 0.65rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      transition: border-color 0.2s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: var(--accent);
    }

    input::placeholder {
      color: var(--text-muted);
      opacity: 0.7;
    }

    button[type="submit"] {
      grid-column: 1 / -1;
      padding: 0.75rem 1.25rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button[type="submit"]:hover {
      background: var(--accent-hover);
    }

    .list-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .list-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .list-header h2 {
      font-size: 1rem;
      font-weight: 600;
    }

    .student-count {
      background: var(--accent);
      color: white;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
    }

    .student-list {
      max-height: 400px;
      overflow-y: auto;
    }

    .student-item {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.5rem;
      align-items: center;
      transition: background 0.15s;
    }

    .student-item:last-child {
      border-bottom: none;
    }

    .student-item:hover {
      background: var(--surface-hover);
    }

    .student-info .name {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .student-info .meta {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.2rem;
    }

    .student-item .remove-btn {
      padding: 0.4rem 0.65rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .student-item .remove-btn:hover {
      border-color: var(--danger);
      color: var(--danger);
      background: rgba(239, 68, 68, 0.08);
    }

    .empty-state {
      padding: 2.5rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .empty-state svg {
      width: 48px;
      height: 48px;
      margin-bottom: 1rem;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Student Registration</h1>
      <p class="subtitle">Add new students to the roster</p>
    </header>

    <form class="form-card" id="registrationForm">
      <h2>Register New Student</h2>
      <div class="form-grid">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="John Doe" required>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="john@example.com" required>
        </div>
        <div class="form-group">
          <label for="phone">Phone</label>
          <input type="tel" id="phone" name="phone" placeholder="+1 234 567 8900">
        </div>
        <div class="form-group">
          <label for="course">Course</label>
          <select id="course" name="course" required>
            <option value="">Select course</option>
            <option value="Computer Science">Computer Science</option>
            <option value="Engineering">Engineering</option>
            <option value="Business">Business</option>
            <option value="Arts">Arts</option>
            <option value="Medicine">Medicine</option>
          </select>
        </div>
        <div class="form-group full">
          <label for="address">Address</label>
          <input type="text" id="address" name="address" placeholder="City, Country">
        </div>
        <button type="submit">Add Student</button>
      </div>
    </form>

    <section class="list-section">
      <div class="list-header">
        <h2>Registered Students</h2>
        <span class="student-count" id="studentCount">0</span>
      </div>
      <div class="student-list" id="studentList">
        <div class="empty-state" id="emptyState">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
          </svg>
          <p>No students registered yet.<br>Add one using the form above.</p>
        </div>
      </div>
    </section>
  </div>

  <script>
    let students = [];

    const form = document.getElementById('registrationForm');
    const studentList = document.getElementById('studentList');
    const studentCount = document.getElementById('studentCount');
    const emptyState = document.getElementById('emptyState');

    function renderStudents() {
      if (students.length === 0) {
        emptyState.style.display = 'block';
        studentList.innerHTML = '';
        studentList.appendChild(emptyState);
      } else {
        emptyState.style.display = 'none';
        studentList.innerHTML = students.map((student, index) => `
          <div class="student-item" data-id="${student.id}">
            <div class="student-info">
              <div class="name">${escapeHtml(student.name)}</div>
              <div class="meta">${escapeHtml(student.email)} • ${escapeHtml(student.course)}${student.phone ? ' • ' + escapeHtml(student.phone) : ''}</div>
            </div>
            <button type="button" class="remove-btn" onclick="removeStudent('${student.id}')">Remove</button>
          </div>
        `).join('');
      }
      studentCount.textContent = students.length;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function removeStudent(id) {
      students = students.filter(s => s.id !== id);
      renderStudents();
    }

    window.removeStudent = removeStudent;

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const formData = new FormData(form);
      const student = {
        id: crypto.randomUUID(),
        name: formData.get('name').trim(),
        email: formData.get('email').trim(),
        phone: formData.get('phone').trim(),
        course: formData.get('course'),
        address: formData.get('address').trim()
      };
      students.push(student);
      form.reset();
      renderStudents();
    });

    renderStudents();
  </script>
</body>
</html>
